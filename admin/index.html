<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>trunk 管理</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    /* ── タブバー ── */
    .admin-tab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: flex;
      background: var(--bg-card);
      border-top: 1px solid var(--border-light);
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }
    .admin-tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 0;
      background: none;
      border: none;
      font-size: 11px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: color .2s;
    }
    .admin-tab-btn.active { color: var(--primary); }
    .admin-tab-icon { width: 22px; height: 22px; display: block; }

    /* ── コンテンツ ── */
    .admin-content {
      padding-bottom: 72px;
      min-height: calc(100vh - 60px);
    }

    /* ── 日付ナビ ── */
    .date-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-light);
      position: sticky;
      top: 60px;
      z-index: 10;
    }
    .date-nav-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 36px; height: 36px;
      font-size: 20px;
      color: var(--text-primary);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .date-nav-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* ── 予約カード ── */
    .reservation-list {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .reservation-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow-sm);
    }
    .reservation-time {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .reservation-info {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .service-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .badge-visit  { background: #E8F5E9; color: #2E7D32; }
    .badge-mobile { background: #FFF3E0; color: #E65100; }
    .reservation-name { font-size: 15px; font-weight: 600; }
    .reservation-menu { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

    /* ── 日付セクションヘッダー ── */
    .date-section-header {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
      padding: 12px 4px 4px;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 2px;
    }

    /* ── 空表示 ── */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* ── エラートースト ── */
    .toast-error { background: #EF5350 !important; }

    /* ── グリッド全体 ── */
    .grid-container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 132px); /* ヘッダー60px + タブバー72px */
    }
    .grid-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-light);
      flex-shrink: 0;
      gap: 8px;
    }
    .grid-toolbar-note {
      font-size: 11px;
      color: var(--text-secondary);
      flex: 1;
    }
    .grid-save-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .grid-save-btn:disabled { opacity: .5; }
    .grid-save-btn.hidden { visibility: hidden; }

    .grid-scroll {
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1;
    }

    /* ── グリッドテーブル ── */
    .grid-table {
      border-collapse: collapse;
      min-width: max-content;
    }

    /* 角（sticky top + left） */
    .grid-corner {
      position: sticky;
      top: 0; left: 0;
      z-index: 30;
      background: var(--bg-card);
      width: 52px; min-width: 52px;
      font-size: 10px;
      color: var(--text-secondary);
      text-align: center;
      padding: 6px 2px;
      border-right: 2px solid var(--border);
      border-bottom: 2px solid var(--border);
    }

    /* 日付ヘッダー（sticky top） */
    .grid-date-th {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--bg-card);
      min-width: 54px;
      text-align: center;
      padding: 5px 2px;
      border-right: 1px solid var(--border-light);
      border-bottom: 2px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      line-height: 1.4;
      white-space: nowrap;
      color: var(--text-primary);
    }
    .grid-date-th.today-col { background: #E8F5E9; color: var(--primary); }
    .grid-date-th.sun       { color: #EF5350; }
    .grid-date-th.sat       { color: #1565C0; }
    .grid-date-th.today-col.sun,
    .grid-date-th.today-col.sat { color: var(--primary); }

    /* 時間ラベル（sticky left） */
    .grid-time-td {
      position: sticky;
      left: 0;
      z-index: 10;
      background: var(--bg-card);
      width: 52px; min-width: 52px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-align: right;
      padding: 0 6px 0 0;
      border-right: 2px solid var(--border);
      border-bottom: 1px solid var(--border-light);
      white-space: nowrap;
      height: 38px;
    }

    /* データセル */
    .grid-cell {
      min-width: 54px;
      height: 38px;
      text-align: center;
      vertical-align: middle;
      border-right: 1px solid var(--border-light);
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      padding: 2px 3px;
    }
    .grid-cell.closed        { color: #D0D0D0; background: #FAFAFA; }
    .grid-cell.open          { color: #2E7D32; background: #F1F8E9; }
    .grid-cell.pending-open  { color: #1B5E20; background: #A5D6A7; } /* 変更あり→開放 */
    .grid-cell.pending-close { color: #B71C1C; background: #FFCDD2; } /* 変更あり→クローズ */
    .grid-cell.reserved      {
      background: #FFF3E0;
      color: #E65100;
      font-size: 10px;
      font-weight: 600;
      line-height: 1.3;
      cursor: default;
    }
    .grid-cell.reserved-open {
      background: #FFE0B2;
      color: #BF360C;
      font-size: 10px;
      font-weight: 600;
      line-height: 1.3;
      cursor: default;
    }
    /* 今日の列 */
    .grid-cell.today-col.closed        { background: #F5FDF5; }
    .grid-cell.today-col.open          { background: #DCEDC8; }

    /* ── プライベートカレンダー予定 ── */
    .grid-cell.cal-event {
      background: #E8EAF6;
      color: #283593;
      font-size: 9px;
      font-weight: 600;
      line-height: 1.3;
      cursor: pointer;
    }
    .grid-cell.cal-event-open {
      background: #C5CAE9;
      color: #1A237E;
      font-size: 9px;
      font-weight: 600;
      line-height: 1.3;
      cursor: pointer;
    }
    .cell-cal-inner {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 50px;
    }

    /* ── インターバル（受付不可バッファ）── */
    .grid-cell.interval {
      background: repeating-linear-gradient(
        -45deg,
        #FAFAFA 0px, #FAFAFA 4px,
        #EEEEEE 4px, #EEEEEE 8px
      );
      color: #BDBDBD;
      cursor: pointer;
    }
    .grid-cell.interval-open {
      background: repeating-linear-gradient(
        -45deg,
        #F1F8E9 0px, #F1F8E9 4px,
        #DCEDC8 4px, #DCEDC8 8px
      );
      color: #558B2F;
      cursor: pointer;
    }
    .cell-interval-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0;
    }

    /* ── 施術予約セル内レイアウト ── */
    .cell-res-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      white-space: nowrap;
      overflow: hidden;
      max-width: 50px;
    }
    .cell-type-dot {
      font-size: 9px;
      font-weight: 700;
      padding: 0 3px;
      border-radius: 3px;
      line-height: 1.4;
    }
    .dot-visit  { background: #C8E6C9; color: #1B5E20; }
    .dot-mobile { background: #FFE0B2; color: #BF360C; }

    /* ── タップ効果 ── */
    .reservation-card.tappable {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity .15s;
    }
    .reservation-card.tappable:active { opacity: .65; }

    /* ── キャンセル済カード ── */
    .reservation-card.cancelled {
      background: #F5F5F5;
      border-color: #E0E0E0;
    }
    .reservation-card.cancelled .reservation-time,
    .reservation-card.cancelled .reservation-name { color: var(--text-secondary); }

    /* ── キャンセル済バッジ ── */
    .badge-cancelled {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: #EEEEEE;
      color: #757575;
      white-space: nowrap;
    }

    /* ── モーダルオーバーレイ ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      z-index: 200;
      transition: background .25s;
      display: flex;
      align-items: flex-end;
    }
    .modal-overlay.visible { background: rgba(0,0,0,.45); }

    /* ── モーダルシート（下から出てくる） ── */
    .modal-sheet {
      width: 100%;
      background: var(--bg-card);
      border-radius: 16px 16px 0 0;
      padding-bottom: env(safe-area-inset-bottom, 16px);
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.25,.8,.25,1);
    }
    .modal-sheet.visible { transform: translateY(0); }

    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 10px auto 0;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border-light);
    }
    .modal-title { font-size: 16px; font-weight: 700; color: var(--text-primary); }
    .modal-close {
      background: none;
      border: none;
      font-size: 18px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
    }

    /* ── キャンセル済バナー ── */
    .modal-cancelled-banner {
      background: #FFF3E0;
      color: #E65100;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      padding: 8px 16px;
      border-bottom: 1px solid #FFE0B2;
    }

    /* ── モーダル本文 ── */
    .modal-body { padding: 4px 16px 16px; }
    .detail-row {
      display: flex;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label {
      flex: 0 0 56px;
      font-size: 12px;
      color: var(--text-secondary);
      padding-top: 3px;
    }
    .detail-value {
      flex: 1;
      font-size: 14px;
      color: var(--text-primary);
      font-weight: 500;
      line-height: 1.6;
    }

    /* ── モーダルフッター ── */
    .modal-footer {
      padding: 0 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn-reschedule-reservation {
      width: 100%;
      background: transparent;
      color: var(--primary);
      border: 2px solid var(--primary);
      border-radius: var(--radius);
      padding: 13px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-reschedule-reservation:active { opacity: .7; }
    .btn-cancel-reservation {
      width: 100%;
      background: #EF5350;
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, background .2s;
    }
    .btn-cancel-reservation:disabled { opacity: .5; cursor: default; }
    .btn-cancel-reservation:not(:disabled):active { opacity: .8; }

    /* ── 日時変更フォーム ── */
    .reschedule-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .reschedule-date-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .reschedule-date-input {
      flex: 1;
      padding: 9px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text-primary);
      background: var(--bg);
    }
    .reschedule-check-btn {
      white-space: nowrap;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .reschedule-check-btn:disabled { opacity: .5; cursor: default; }
    .reschedule-slots-container {
      max-height: 160px;
      overflow-y: auto;
    }
    .reschedule-loading,
    .reschedule-no-slots {
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
      padding: 12px 0;
    }
    .reschedule-slots-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .reschedule-slots-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .reschedule-slot-btn {
      padding: 6px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
    }
    .reschedule-slot-btn.selected {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .btn-confirm-reschedule {
      width: 100%;
      background: #2E7D32;
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
      line-height: 1.4;
    }
    .btn-confirm-reschedule:disabled { opacity: .5; cursor: default; }
    .btn-confirm-reschedule:not(:disabled):active { opacity: .8; }
    .btn-back-reschedule {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      padding: 4px 0;
      text-align: left;
    }

    /* ── 代理予約フォーム ── */
    .bk-scroll {
      padding: 12px 16px 32px;
    }
    .bk-section {
      margin-bottom: 22px;
    }
    .bk-section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-bottom: 10px;
      padding-bottom: 5px;
      border-bottom: 1px solid var(--border-light);
    }
    .bk-pill-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .bk-pill-col {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .bk-pill {
      padding: 8px 18px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .bk-pill.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .bk-pill-wide {
      border-radius: var(--radius-sm);
      text-align: left;
      padding: 11px 14px;
    }
    .bk-field { margin-bottom: 10px; }
    .bk-label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
      margin-bottom: 4px;
    }
    .bk-required { color: #EF5350; }
    .bk-input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 15px;
      color: var(--text-primary);
      background: var(--bg);
      box-sizing: border-box;
    }
    .bk-input:focus { outline: none; border-color: var(--primary); }
    .bk-date-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .bk-date-input {
      flex: 1;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 15px;
      color: var(--text-primary);
      background: var(--bg);
    }
    .bk-check-btn {
      white-space: nowrap;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .bk-check-btn:disabled { opacity: .45; cursor: default; }
    .bk-slots-area { margin-top: 10px; min-height: 24px; }
    .bk-slots-note {
      font-size: 13px;
      color: var(--text-secondary);
      padding: 8px 0;
    }
    .bk-slots-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .bk-slots-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .bk-slot-btn {
      padding: 7px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
    }
    .bk-slot-btn.selected {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .bk-submit-area { margin-top: 24px; padding-bottom: 8px; }
    .bk-submit-btn {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
    }
    .bk-submit-btn:disabled { opacity: .35; cursor: default; }
    .bk-submit-btn:not(:disabled):active { opacity: .8; }

    /* ── 代理予約 成功画面 ── */
    .bk-success {
      padding: 40px 20px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }
    .bk-success-icon {
      width: 64px; height: 64px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 700;
      color: #fff;
    }
    .bk-success-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .bk-success-detail {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 4px 16px;
    }
    .bk-success-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-light);
      font-size: 14px;
    }
    .bk-success-row:last-child { border-bottom: none; }
    .bk-success-label {
      flex: 0 0 52px;
      font-size: 12px;
      color: var(--text-secondary);
      padding-top: 2px;
    }
    .bk-btn-primary {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .bk-btn-secondary {
      width: 100%;
      background: none;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ── ステップバー ── */
    .bk-step-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin: 0 0 24px;
    }
    .bk-step {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid var(--border);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      flex-shrink: 0;
    }
    .bk-step.active {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-pale, #e8f5e9);
    }
    .bk-step.done {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }
    .bk-step-line {
      flex: 1;
      height: 2px;
      background: var(--border);
      max-width: 48px;
    }
    .bk-step-line.active { background: var(--primary); }

    /* ── グリッドフッター（戻る＋次へ） ── */
    .bk-grid-footer {
      display: flex;
      gap: 8px;
      align-items: stretch;
      padding-bottom: 8px;
    }
    .bk-grid-footer .bk-btn-secondary { flex: 0 0 auto; width: auto; padding: 14px 18px; }
    .bk-submit-inline { flex: 1; padding: 14px; font-size: 15px; }

    /* ── グリッドローディング ── */
    .bk-grid-loading {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 32px 0;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 13px;
    }

    /* ── 代理予約グリッド（bk-cg-*） ── */
    .bk-no-avail {
      margin: 0 0 8px;
      padding: 10px 14px;
      background: #FFF3CD;
      border: 1px solid #FADA7A;
      border-radius: 8px;
      color: #7A5C00;
      font-size: 13px;
      text-align: center;
    }
    .bk-cg-nav {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .bk-cg-nav-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
    }
    .bk-cg-nav-btn:disabled { opacity: .4; cursor: default; }
    .bk-cg-banner {
      background: var(--primary-pale, #e8f5e9);
      border: 1px solid var(--primary);
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      text-align: center;
      margin-bottom: 8px;
    }
    .bk-cg-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-bottom: 16px;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
    }
    .bk-cg-table {
      border-collapse: collapse;
      min-width: 100%;
      font-size: 12px;
    }
    .bk-cg-corner {
      position: sticky;
      left: 0;
      background: var(--bg-card);
      z-index: 2;
      min-width: 44px;
      padding: 6px 4px;
      text-align: center;
      font-size: 10px;
      color: var(--text-secondary);
      border-right: 1px solid var(--border-light);
      border-bottom: 1px solid var(--border-light);
    }
    .bk-cg-th {
      min-width: 34px;
      padding: 5px 2px;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      border-bottom: 1px solid var(--border-light);
      border-right: 1px solid var(--border-light);
      background: var(--bg-card);
      white-space: nowrap;
    }
    .bk-cg-th.bk-cg-today { background: var(--primary-pale, #e8f5e9); color: var(--primary); }
    .bk-cg-th.bk-cg-sun   { color: #C0392B; }
    .bk-cg-th.bk-cg-sat   { color: #1565C0; }
    .bk-cg-dow { font-weight: 400; font-size: 10px; }
    .bk-cg-time {
      position: sticky;
      left: 0;
      background: var(--bg-card);
      z-index: 1;
      padding: 5px 4px;
      text-align: right;
      font-size: 11px;
      color: var(--text-secondary);
      border-right: 1px solid var(--border-light);
      border-bottom: 1px solid var(--border-light);
      white-space: nowrap;
    }
    .bk-cg-cell {
      text-align: center;
      padding: 5px 2px;
      border-right: 1px solid var(--border-light);
      border-bottom: 1px solid var(--border-light);
      font-size: 12px;
      min-width: 34px;
    }
    .bk-cg-cell.bk-cg-open {
      color: var(--primary);
      font-weight: 700;
      cursor: pointer;
      background: #f0faf0;
    }
    .bk-cg-cell.bk-cg-open:active { background: #d0e8d0; }
    .bk-cg-cell.bk-cg-sel {
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .bk-cg-cell.bk-cg-closed {
      color: var(--border);
      background: var(--bg);
    }
  </style>
</head>
