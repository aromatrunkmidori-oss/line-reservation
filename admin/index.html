<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>trunk 管理</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    /* ── タブバー ── */
    .admin-tab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: flex;
      background: var(--bg-card);
      border-top: 1px solid var(--border-light);
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }
    .admin-tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 0;
      background: none;
      border: none;
      font-size: 11px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: color .2s;
    }
    .admin-tab-btn.active { color: var(--primary); }
    .admin-tab-icon { width: 22px; height: 22px; display: block; }

    /* ── コンテンツ ── */
    .admin-content {
      padding-bottom: 72px;
      min-height: calc(100vh - 60px);
    }

    /* ── 日付ナビ ── */
    .date-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-light);
      position: sticky;
      top: 60px;
      z-index: 10;
    }
    .date-nav-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 36px; height: 36px;
      font-size: 20px;
      color: var(--text-primary);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .date-nav-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* ── 予約カード ── */
    .reservation-list {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .reservation-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow-sm);
    }
    .reservation-time {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .reservation-info {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .service-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .badge-visit  { background: #E8F5E9; color: #2E7D32; }
    .badge-mobile { background: #FFF3E0; color: #E65100; }
    .reservation-name { font-size: 15px; font-weight: 600; }
    .reservation-menu { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

    /* ── 日付セクションヘッダー ── */
    .date-section-header {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
      padding: 12px 4px 4px;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 2px;
    }

    /* ── 空表示 ── */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* ── エラートースト ── */
    .toast-error { background: #EF5350 !important; }

    /* ── グリッド全体 ── */
    .grid-container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 132px); /* ヘッダー60px + タブバー72px */
    }
    .grid-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-light);
      flex-shrink: 0;
      gap: 8px;
    }
    .grid-toolbar-note {
      font-size: 11px;
      color: var(--text-secondary);
      flex: 1;
    }
    .grid-save-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .grid-save-btn:disabled { opacity: .5; }
    .grid-save-btn.hidden { visibility: hidden; }

    .grid-scroll {
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1;
    }

    /* ── グリッドテーブル ── */
    .grid-table {
      border-collapse: collapse;
      min-width: max-content;
    }

    /* 角（sticky top + left） */
    .grid-corner {
      position: sticky;
      top: 0; left: 0;
      z-index: 30;
      background: var(--bg-card);
      width: 52px; min-width: 52px;
      font-size: 10px;
      color: var(--text-secondary);
      text-align: center;
      padding: 6px 2px;
      border-right: 2px solid var(--border);
      border-bottom: 2px solid var(--border);
    }

    /* 日付ヘッダー（sticky top） */
    .grid-date-th {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--bg-card);
      min-width: 54px;
      text-align: center;
      padding: 5px 2px;
      border-right: 1px solid var(--border-light);
      border-bottom: 2px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      line-height: 1.4;
      white-space: nowrap;
      color: var(--text-primary);
    }
    .grid-date-th.today-col { background: #E8F5E9; color: var(--primary); }
    .grid-date-th.sun       { color: #EF5350; }
    .grid-date-th.sat       { color: #1565C0; }
    .grid-date-th.today-col.sun,
    .grid-date-th.today-col.sat { color: var(--primary); }

    /* 時間ラベル（sticky left） */
    .grid-time-td {
      position: sticky;
      left: 0;
      z-index: 10;
      background: var(--bg-card);
      width: 52px; min-width: 52px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-align: right;
      padding: 0 6px 0 0;
      border-right: 2px solid var(--border);
      border-bottom: 1px solid var(--border-light);
      white-space: nowrap;
      height: 38px;
    }

    /* データセル */
    .grid-cell {
      min-width: 54px;
      height: 38px;
      text-align: center;
      vertical-align: middle;
      border-right: 1px solid var(--border-light);
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      padding: 2px 3px;
    }
    .grid-cell.closed        { color: #D0D0D0; background: #FAFAFA; }
    .grid-cell.open          { color: #2E7D32; background: #F1F8E9; }
    .grid-cell.pending-open  { color: #1B5E20; background: #A5D6A7; } /* 変更あり→開放 */
    .grid-cell.pending-close { color: #B71C1C; background: #FFCDD2; } /* 変更あり→クローズ */
    .grid-cell.reserved      {
      background: #FFF3E0;
      color: #E65100;
      font-size: 10px;
      font-weight: 600;
      line-height: 1.3;
      cursor: default;
    }
    .grid-cell.reserved-open {
      background: #FFE0B2;
      color: #BF360C;
      font-size: 10px;
      font-weight: 600;
      line-height: 1.3;
      cursor: default;
    }
    /* 今日の列 */
    .grid-cell.today-col.closed        { background: #F5FDF5; }
    .grid-cell.today-col.open          { background: #DCEDC8; }

    /* ── タップ効果 ── */
    .reservation-card.tappable {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity .15s;
    }
    .reservation-card.tappable:active { opacity: .65; }

    /* ── キャンセル済カード ── */
    .reservation-card.cancelled {
      background: #F5F5F5;
      border-color: #E0E0E0;
    }
    .reservation-card.cancelled .reservation-time,
    .reservation-card.cancelled .reservation-name { color: var(--text-secondary); }

    /* ── キャンセル済バッジ ── */
    .badge-cancelled {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: #EEEEEE;
      color: #757575;
      white-space: nowrap;
    }

    /* ── モーダルオーバーレイ ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      z-index: 200;
      transition: background .25s;
      display: flex;
      align-items: flex-end;
    }
    .modal-overlay.visible { background: rgba(0,0,0,.45); }

    /* ── モーダルシート（下から出てくる） ── */
    .modal-sheet {
      width: 100%;
      background: var(--bg-card);
      border-radius: 16px 16px 0 0;
      padding-bottom: env(safe-area-inset-bottom, 16px);
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.25,.8,.25,1);
    }
    .modal-sheet.visible { transform: translateY(0); }

    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 10px auto 0;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border-light);
    }
    .modal-title { font-size: 16px; font-weight: 700; color: var(--text-primary); }
    .modal-close {
      background: none;
      border: none;
      font-size: 18px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
    }

    /* ── キャンセル済バナー ── */
    .modal-cancelled-banner {
      background: #FFF3E0;
      color: #E65100;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      padding: 8px 16px;
      border-bottom: 1px solid #FFE0B2;
    }

    /* ── モーダル本文 ── */
    .modal-body { padding: 4px 16px 16px; }
    .detail-row {
      display: flex;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label {
      flex: 0 0 56px;
      font-size: 12px;
      color: var(--text-secondary);
      padding-top: 3px;
    }
    .detail-value {
      flex: 1;
      font-size: 14px;
      color: var(--text-primary);
      font-weight: 500;
      line-height: 1.6;
    }

    /* ── モーダルフッター ── */
    .modal-footer { padding: 0 16px 16px; }
    .btn-cancel-reservation {
      width: 100%;
      background: #EF5350;
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, background .2s;
    }
    .btn-cancel-reservation:disabled { opacity: .5; cursor: default; }
    .btn-cancel-reservation:not(:disabled):active { opacity: .8; }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading-screen">
      <div class="loading-logo">trunk</div>
      <div class="spinner"></div>
    </div>
  </div>

</body>
</html>
